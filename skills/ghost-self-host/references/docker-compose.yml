version: '3.8'

services:
  ghost-db:
    image: mysql:8.0
    container_name: ghost-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: "{{DB_ROOT_PASSWORD}}"
      MYSQL_DATABASE: ghost_prod
      MYSQL_USER: ghost
      MYSQL_PASSWORD: "{{DB_GHOST_PASSWORD}}"
    volumes:
      - ghost-db-data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password

  ghost-app:
    image: ghost:5-alpine
    container_name: ghost-app
    restart: always
    depends_on:
      - ghost-db
    ports:
      # Bind to localhost loopback interface for security
      - "127.0.0.1:2368:2368"
    environment:
      url: "https://{{domain}}"
      database__client: mysql
      database__connection__host: ghost-db
      database__connection__user: ghost
      database__connection__password: "{{DB_GHOST_PASSWORD}}"
      database__connection__database: ghost_prod
    volumes:
      - ghost-app-content:/var/lib/ghost/content

volumes:
  ghost-db-data:
  ghost-app-content:
