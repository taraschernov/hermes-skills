services:
  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    restart: always
    ports:
      - "127.0.0.1:5678:5678"   # localhost ONLY — nginx is the public edge
    env_file:
      - .env
    environment:
      - N8N_PORT=5678
      - N8N_PROTOCOL=https
      - N8N_HOST={{domain}}
      - WEBHOOK_URL=https://{{domain}}/
      - GENERIC_TIMEZONE={{TIMEZONE}}
      - TZ={{TIMEZONE}}
      - N8N_SECURE_COOKIE=false
    volumes:
      - "{{HOME}}/n8n/data:/home/node/.n8n"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:5678/healthz"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - n8n-net

networks:
  n8n-net:
    driver: bridge
